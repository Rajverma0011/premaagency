{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prema Agency</title>

<link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
</head>

<body class="bg-white">


<!-- ================= NAVBAR ================= -->
<nav class="bg-black text-white sticky top-0 z-50">
	<div class="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">
		<!-- LOGO -->
		<div class="font-bold text-lg md:text-xl whitespace-nowrap">
			Prema Agency
		</div>
		<!-- MOBILE MENU BUTTON -->
		<button id="mobile-menu-toggle" class="md:hidden focus:outline-none">
			<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
			</svg>
		</button>
	</div>
	<!-- MOBILE MENU DROPDOWN -->
	<div id="mobile-menu" class="md:hidden hidden bg-black border-t border-gray-700">
		<div class="flex flex-col gap-2 px-4 py-3">
			<a href="/" class="hover:text-green-400 transition py-2">Home</a>
			<a href="/tiles" class="hover:text-green-400 transition py-2">Tiles</a>
			<a href="/sanitary" class="hover:text-green-400 transition py-2">Sanitary</a>
			<a href="/contact" class="hover:text-green-400 transition py-2">Contact</a>
		</div>
	</div>
</nav>

<script>
	// Mobile menu toggle
	document.addEventListener('DOMContentLoaded', function() {
		const toggle = document.getElementById('mobile-menu-toggle');
		const menu = document.getElementById('mobile-menu');
		if (toggle && menu) {
			toggle.addEventListener('click', function() {
				menu.classList.toggle('hidden');
			});
		}
	});
</script>

<!-- ================= CONTENT ================= -->

{% block content %}{% endblock %}

<!-- ================= WHATSAPP ================= -->

<a href="https://wa.me/917985995508"
class="fixed bottom-4 right-4 bg-green-500 text-white px-4 py-3 rounded-full shadow-lg z-50">
WhatsApp </a>

</body>
</html>
