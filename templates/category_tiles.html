<!-- PAGE TITLE -->
<h1 class="text-4xl font-bold text-center text-black mb-12 capitalize">
  {{ category }} Tiles
</h1>

<!-- TILE GRID -->
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">

  {% for tile in tiles %}

  <!-- TILE CARD -->
  <div class="bg-white rounded-xl shadow-lg hover:shadow-2xl transition duration-300">

    <!-- IMAGE -->
    <a href="{% url 'tile_detail' tile.id %}">
      <img src="{{ tile.image.url }}"
           class="h-48 w-full object-cover rounded-t-xl hover:scale-105 transition duration-300">
    </a>

    <!-- DETAILS -->
    <div class="p-4">

      <!-- TILE NAME (FORCE DARK) -->
      <h2 class="text-black font-bold text-lg mb-1">
        {{ tile.name }}
      </h2>

      <!-- SIZE -->
      <p class="text-gray-700 text-sm">
        Size: {{ tile.size }}
      </p>

      <!-- PRICE -->
      <p class="text-black font-bold text-lg mt-1">
        ₹{{ tile.price }}
      </p>

      <!-- WHATSAPP -->
      <a href="https://wa.me/917985995508?text=Hello I am interested in {{ tile.name }}"
         class="btn btn-success btn-sm w-full mt-3">
        WhatsApp
      </a>

    </div>

  </div>

  {% endfor %}

</div>
